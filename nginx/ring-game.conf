# ─── HTTP (domain yokken IP ile erişim) ──────────────────────────────────────
server {
    listen 80;
    server_name 135.181.206.109 _;

    root /var/www/ring-game;
    index index.html;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Vite fingerprinted assets — 1 yıl cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker — asla cache edilmemeli
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }
}

# ─── HTTPS (domain eklenince aktif et) ───────────────────────────────────────
# Domain aldıktan sonra aşağıdaki bloğu aktif et ve üstteki sunucuyu
# 301 yönlendirme ile değiştir. Certbot bunu otomatik yapar:
#   certbot --nginx -d ring.yourdomain.com
#
# server {
#     listen 443 ssl http2;
#     server_name ring.yourdomain.com;
#     ssl_certificate     /etc/letsencrypt/live/ring.yourdomain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/ring.yourdomain.com/privkey.pem;
#     include             /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
#     root /var/www/ring-game;
#     ... (üstteki location blokları aynı)
# }
