<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0f0f23"/>
  <!-- Tube body -->
  <rect x="27" y="8" width="10" height="46" rx="5" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <!-- Ring 4 — yellow (top, lifted out) -->
  <ellipse cx="32" cy="11" rx="9" ry="4.5" fill="none" stroke="#EAB308" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <!-- Ring 3 — red -->
  <ellipse cx="32" cy="24" rx="9" ry="4.5" fill="none" stroke="#EF4444" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <!-- Ring 2 — green -->
  <ellipse cx="32" cy="37" rx="9" ry="4.5" fill="none" stroke="#22C55E" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <!-- Ring 1 — blue (bottom) -->
  <ellipse cx="32" cy="50" rx="9" ry="4.5" fill="none" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
  <!-- Shine on top ring -->
  <ellipse cx="29" cy="10" rx="2.5" ry="1.2" fill="white" opacity="0.3"/>
</svg>
