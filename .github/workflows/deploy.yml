name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  # ── Test + Build ────────────────────────────────────────────────────────────
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ring-game/package-lock.json

      - name: Install dependencies
        working-directory: ring-game
        run: npm ci

      - name: Run unit tests
        working-directory: ring-game
        run: npm test

      - name: Production build
        working-directory: ring-game
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ring-game/dist/
          retention-days: 1

  # ── Deploy (main branch only) ───────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST || '135.181.206.109' }}
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Trust the VPS host key (custom port)
          ssh-keyscan -p "$SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Sync built files to web root
          rsync -az --delete --checksum \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            dist/ \
            "$VPS_USER@$VPS_HOST:/var/www/ring-game/"

          # Verify deploy
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "$VPS_USER@$VPS_HOST" \
            "ls -la /var/www/ring-game/index.html && echo 'Deploy verified ✓'"
